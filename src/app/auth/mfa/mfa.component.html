<div class="d-grid align-items-center justify-content-center min-vh-100 bg-light p-4">
  <div class="card auth-card">
    <div class="card-header bg-dark d-flex justify-content-between align-items-center px-3 py-1">
      <img src="/equip-logo.png" alt="eQuip Logo" class="auth-logo" />
      <h1 class="text-white text-end flex-grow-1 ms-3 mb-0 auth-title">Admin Portal</h1>
    </div>
    <div class="card-body">
      <h2 class="mb-1">Two-factor authentication</h2>
      <p class="text-muted mb-4">Enter the 6-digit code sent to your device.</p>

      <form [formGroup]="form" (ngSubmit)="submit()" class="d-flex flex-column biginputs">
        <div class="d-flex justify-content-between gap-2 mb-3">
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d0"
            class="form-control text-center otp-input" autocomplete="one-time-code"
            (input)="onInput($event, 0)" (keydown)="onKeydown($event, 0)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d1"
            class="form-control text-center otp-input"
            (input)="onInput($event, 1)" (keydown)="onKeydown($event, 1)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d2"
            class="form-control text-center otp-input"
            (input)="onInput($event, 2)" (keydown)="onKeydown($event, 2)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d3"
            class="form-control text-center otp-input"
            (input)="onInput($event, 3)" (keydown)="onKeydown($event, 3)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d4"
            class="form-control text-center otp-input"
            (input)="onInput($event, 4)" (keydown)="onKeydown($event, 4)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
          <input #codeInput type="text" inputmode="numeric" maxlength="1" formControlName="d5"
            class="form-control text-center otp-input"
            (input)="onInput($event, 5)" (keydown)="onKeydown($event, 5)"
            (focus)="onFocus($event)" (paste)="onPaste($event)" />
        </div>

        <button type="submit" class="btn btn-dark w-100 mb-3" [disabled]="loading() || form.invalid">
          {{ loading() ? 'Verifying…' : 'Verify code' }}
        </button>

        @if (error()) {
          <div class="alert alert-danger mb-0" role="alert">
            {{ error() }}
          </div>
        }
      </form>
    </div>
  </div>
</div>
