<section class="page-shell">

  <div class="page-shell-header">
    <h1 class="page-title">Address</h1>
    <p class="page-subtitle">Address details for <strong>{{ partnerMode.activePartner()?.tpName }}</strong></p>
  </div>

  @if (loading()) {
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Loading…
    </div>
  } @else if (loadError()) {
    <div class="alert alert-danger d-flex align-items-center gap-2 mt-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ loadError() }}</span>
    </div>
  } @else {

    <form (ngSubmit)="save()" novalidate class="mt-3">
      <div class="card border-0 shadow-sm">

        <div class="card-body p-4">
          <div class="row g-3">

            <div class="col-12 mt-0">
              <label class="form-label fw-semibold" for="addr-line1">Address Line 1</label>
              <input
                id="addr-line1"
                type="text"
                class="form-control"
                [(ngModel)]="form.addr_line1"
                name="addr_line1"
                maxlength="150"
                placeholder="Street address"
              />
            </div>

            <div class="col-12 mt-0">
              <label class="form-label fw-semibold" for="addr-line2">Address Line 2</label>
              <input
                id="addr-line2"
                type="text"
                class="form-control"
                [(ngModel)]="form.addr_line2"
                name="addr_line2"
                maxlength="150"
                placeholder="Apt, suite, unit, etc. (optional)"
              />
            </div>

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="addr-city">City</label>
              <input
                id="addr-city"
                type="text"
                class="form-control"
                [(ngModel)]="form.city"
                name="city"
                maxlength="100"
                placeholder="City"
              />
            </div>

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="addr-province">Province / State</label>
              <input
                id="addr-province"
                type="text"
                class="form-control"
                [(ngModel)]="form.province"
                name="province"
                maxlength="100"
                placeholder="Province or state"
              />
            </div>

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="addr-postal">Postal Code</label>
              <input
                id="addr-postal"
                type="text"
                class="form-control"
                [(ngModel)]="form.postal_code"
                name="postal_code"
                maxlength="20"
                placeholder="Postal / ZIP code"
              />
            </div>

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="addr-country">Country</label>
              <select
                id="addr-country"
                class="form-select"
                [(ngModel)]="form.country"
                name="country"
              >
                <option value="">— Select a country —</option>
                <option value="US">USA</option>
                <option value="CA">Canada</option>
              </select>
            </div>

          </div>
        </div>

        <div class="card-footer bg-transparent border-0 d-flex justify-content-end align-items-center p-4 pt-0">
          <div class="d-flex align-items-center gap-2">
            @if (saveError()) {
              <div class="alert alert-danger d-flex align-items-center gap-2 mb-0 py-2 px-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ saveError() }}</span>
              </div>
            }
            @if (saveSuccess()) {
              <div class="alert alert-success d-flex align-items-center gap-2 mb-0 py-2 px-3" role="alert">
                <i class="bi bi-patch-check-fill"></i>
                <span>Saved successfully!</span>
              </div>
            }
            <button type="submit" class="btn btn-dark" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Saving…
              } @else {
                <i class="bi bi-check-lg me-1"></i>Save
              }
            </button>
          </div>
        </div>

      </div>
    </form>

  }

</section>
