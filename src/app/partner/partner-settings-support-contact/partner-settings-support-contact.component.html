<section class="page-shell">

  <div class="page-shell-header">
    <h1 class="page-title">Support Contact</h1>
    <p class="page-subtitle">Support contact for <strong>{{ partnerMode.activePartner()?.tpName }}</strong></p>
  </div>

  @if (loading()) {
    <div class="text-center py-5 text-muted">
      <div class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></div>
      Loading…
    </div>
  } @else if (loadError()) {
    <div class="alert alert-danger d-flex align-items-center gap-2 mt-3" role="alert">
      <i class="bi bi-exclamation-triangle-fill"></i>
      <span>{{ loadError() }}</span>
    </div>
  } @else {

    <form (ngSubmit)="save()" novalidate class="mt-3">
      <div class="card border-0 shadow-sm">

        <div class="card-body p-4">
          <div class="row g-3">

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="sup-name">Support Name</label>
              <input
                id="sup-name"
                type="text"
                class="form-control"
                [(ngModel)]="form.supprt_name"
                name="supprt_name"
                maxlength="150"
                placeholder="Support team or person name"
              />
            </div>

            <div class="col-md-6 mt-0">
              <label class="form-label fw-semibold" for="sup-email">Email Address</label>
              <input
                id="sup-email"
                type="email"
                class="form-control"
                [(ngModel)]="form.supprt_eml"
                name="supprt_eml"
                maxlength="200"
                placeholder="support@example.com"
                (blur)="emailTouched.set(true)"
                [class.is-invalid]="emailTouched() && !isValidEmail(form.supprt_eml)"
              />
              <div class="invalid-feedback">Enter a valid email address.</div>
            </div>

          </div>
        </div>

        <div class="card-footer bg-transparent border-0 d-flex justify-content-end align-items-center p-4 pt-0">
          <div class="d-flex align-items-center gap-2">
            @if (saveError()) {
              <div class="alert alert-danger d-flex align-items-center gap-2 mb-0 py-2 px-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>{{ saveError() }}</span>
              </div>
            }
            @if (saveSuccess()) {
              <div class="alert alert-success d-flex align-items-center gap-2 mb-0 py-2 px-3" role="alert">
                <i class="bi bi-patch-check-fill"></i>
                <span>Saved successfully!</span>
              </div>
            }
            <button type="submit" class="btn btn-dark" [disabled]="saving()">
              @if (saving()) {
                <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                Saving…
              } @else {
                <i class="bi bi-check-lg me-1"></i>Save
              }
            </button>
          </div>
        </div>

      </div>
    </form>

  }

</section>
