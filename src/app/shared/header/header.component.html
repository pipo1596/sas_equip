<nav class="main-header navbar navbar-expand navbar-dark" [class.partner-mode-header]="partnerMode.activePartner()">

  <!-- Left: sidebar toggle -->
  <ul class="navbar-nav">
    <li class="nav-item">
      <button class="nav-link btn btn-link border-0 pb-0 pt-1" type="button"
              (click)="sidebar.toggle()" aria-label="Toggle sidebar">
        <i class="bi bi-list fs-4"></i>
      </button>
    </li>
  </ul>

  <!-- Logo: mobile only — sidebar carries it on larger screens -->
  <a class="navbar-brand d-flex d-lg-none align-items-center ms-1 me-auto" routerLink="/dashboard">
    <img src="/equip-logo.png" alt="eQuip" class="brand-image" />
  </a>

  <!-- Left nav links (desktop) — hidden in partner mode -->
  @if (!partnerMode.activePartner()) {
    <ul class="navbar-nav d-none d-lg-flex">
      <li class="nav-item">
        <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">Dashboard</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/reports" routerLinkActive="active">Reports</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" routerLink="/settings" routerLinkActive="active">Settings</a>
      </li>
    </ul>
  }

  <!-- Right: user dropdown -->
  <ul class="navbar-nav ms-auto">
    <li class="nav-item dropdown me-5" [class.show]="userMenuOpen()" #userDropdown>
      <a class="nav-link d-flex align-items-center gap-2 user-toggle" href="javascript:void(0)"
         (click)="toggleUserMenu()">
        <span class="user-avatar d-inline-flex align-items-center justify-content-center rounded-circle bg-primary text-white"             >
          {{ initials() }}
        </span>
        <span class="d-none d-md-inline">Welcome, {{ displayName() }}</span>
        <i class="bi bi-caret-down-fill small ms-1"></i>
      </a>
      <ul class="dropdown-menu" [class.show]="userMenuOpen()">
        <li>
          <a class="dropdown-item" routerLink="/profile" (click)="userMenuOpen.set(false)">
            <i class="bi bi-person me-2"></i>Profile
          </a>
        </li>
        <li><hr class="dropdown-divider" /></li>
        <li>
          <button class="dropdown-item text-danger" type="button" (click)="logout()">
            <i class="bi bi-box-arrow-right me-2"></i>Sign out
          </button>
        </li>
      </ul>
    </li>
  </ul>

</nav>
